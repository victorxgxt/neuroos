<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroOS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070D;--s1:#0D0D16;--s2:#14141E;--s3:#1B1B28;
  --b1:#1E1E2C;--b2:#2A2A3C;--b3:#38384E;
  --t1:#EEEEFF;--t2:#9090B8;--t3:#5A5A7A;--t4:#383858;
  --brand:#7B5EA7;--brand2:#A78BFA;--glow:rgba(123,94,167,.3);
  --green:#0EA472;--green2:#34D399;
  --amber:#D97706;--amber2:#FCD34D;
  --red:#DC2626;--red2:#F87171;
  --blue2:#60A5FA;--pink2:#F472B6;
  --r:12px;--r2:16px;--r3:22px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif}

/* ── AUTH SCREEN ── */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.auth-box{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r3);padding:36px;width:100%;max-width:400px;animation:fi .3s ease}
.auth-logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:28px}
.auth-mark{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--brand),#C084FC);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:#fff;box-shadow:0 0 24px var(--glow)}
.auth-name{font-family:'Syne',sans-serif;font-weight:800;font-size:20px}
.auth-title{font-family:'Syne',sans-serif;font-weight:700;font-size:22px;margin-bottom:6px;text-align:center}
.auth-sub{font-size:13px;color:var(--t3);text-align:center;margin-bottom:24px}
.auth-tabs{display:flex;background:var(--s2);border-radius:var(--r);padding:4px;gap:4px;margin-bottom:24px}
.auth-tab{flex:1;padding:8px;text-align:center;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--t3);transition:all .15s}
.auth-tab.on{background:var(--s1);color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.oauth-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:11px;border:1px solid var(--b2);border-radius:var(--r);background:var(--s2);color:var(--t1);cursor:pointer;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .15s;margin-bottom:8px}
.oauth-btn:hover{border-color:var(--brand2);background:var(--s3)}
.sep{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--t4);font-size:11px}
.sep::before,.sep::after{content:'';flex:1;height:1px;background:var(--b2)}
.auth-form{display:flex;flex-direction:column;gap:12px}
.auth-err{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.3);border-radius:var(--r);padding:10px 14px;font-size:12px;color:var(--red2);display:none}
.auth-err.show{display:block}

/* ── APP ── */
#app{display:none;height:100vh;overflow:hidden}
#app.show{display:flex}
#sidebar{width:224px;min-width:224px;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden;transition:width .25s ease}
#sidebar.col{width:60px;min-width:60px}
.sb-logo{display:flex;align-items:center;gap:10px;padding:16px 14px;border-bottom:1px solid var(--b1);flex-shrink:0}
.sb-mark{width:32px;height:32px;min-width:32px;border-radius:9px;background:linear-gradient(135deg,var(--brand),#C084FC);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:#fff;box-shadow:0 0 14px var(--glow)}
.sb-nm{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;transition:opacity .2s,width .2s}
#sidebar.col .sb-nm{opacity:0;width:0}
.sb-nav{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:1px}
.sb-sec{font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--t4);text-transform:uppercase;padding:10px 8px 3px;white-space:nowrap;overflow:hidden;transition:opacity .2s}
#sidebar.col .sb-sec{opacity:0}
.ni{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r);cursor:pointer;transition:all .15s;color:var(--t3);font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;border:1px solid transparent;user-select:none}
.ni:hover{background:var(--s2);color:var(--t2)}
.ni.on{background:rgba(123,94,167,.14);color:var(--t1);border-color:rgba(123,94,167,.25)}
.ni.on svg{color:var(--brand2)}
.ni svg{width:18px;height:18px;flex-shrink:0}
.ni-lbl{flex:1;overflow:hidden;transition:opacity .2s,width .2s}
#sidebar.col .ni-lbl{opacity:0;width:0}
.nb{font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px;background:var(--brand);color:#fff;font-family:'JetBrains Mono',monospace;flex-shrink:0;transition:opacity .2s}
#sidebar.col .nb{opacity:0}
.sb-foot{padding:8px;border-top:1px solid var(--b1);flex-shrink:0}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:54px;min-height:54px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
#tb-tog{background:none;border:none;cursor:pointer;color:var(--t3);padding:6px;border-radius:8px;display:flex;transition:all .15s}
#tb-tog:hover{background:var(--s2);color:var(--t1)}
#tb-title{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;flex:1}
#tb-date{font-size:11px;color:var(--t4);font-family:'JetBrains Mono',monospace}
.av{width:30px;height:30px;min-width:30px;border-radius:50%;background:linear-gradient(135deg,var(--brand),#C084FC);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;cursor:pointer;position:relative}
.av-menu{display:none;position:absolute;top:38px;right:0;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r2);padding:6px;min-width:180px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.av-menu.open{display:block}
.av-menu-item{padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--t2);transition:all .15s}
.av-menu-item:hover{background:var(--s3);color:var(--t1)}
#content{flex:1;overflow-y:auto;padding:24px}
.page{display:none;animation:fi .22s ease}
.page.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.ga{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2);padding:20px}
.ct{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:14px}
.stat{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2);padding:16px 18px}
.sl{font-size:11px;color:var(--t3);margin-bottom:6px}
.sv{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;line-height:1}
.ss{font-size:11px;color:var(--t3);margin-top:4px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sh h2{font-family:'Syne',sans-serif;font-weight:700;font-size:17px}
.sh p{font-size:11px;color:var(--t3);margin-top:2px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:'DM Sans',sans-serif}
.bp{background:var(--brand);color:#fff}.bp:hover{background:#9370d8;transform:translateY(-1px);box-shadow:0 4px 14px var(--glow)}
.bg{background:transparent;color:var(--t2);border:1px solid var(--b2)}.bg:hover{background:var(--s2);color:var(--t1)}
.bsm{padding:5px 10px;font-size:12px;border-radius:8px}
.input{width:100%;background:var(--s1);border:1px solid var(--b2);border-radius:var(--r);padding:10px 14px;color:var(--t1);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border .15s}
.input:focus{border-color:var(--brand)}
.input::placeholder{color:var(--t4)}
select.input option{background:var(--s2)}
textarea.input{resize:vertical;min-height:80px}
.ir{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.ir label{font-size:12px;font-weight:600;color:var(--t2)}
.prog{height:5px;background:var(--s3);border-radius:99px;overflow:hidden;margin-top:6px}
.pf{height:100%;border-radius:99px;transition:width .6s ease}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:99px;font-size:10px;font-weight:700;border:1px solid}
.bb{background:rgba(123,94,167,.15);color:var(--brand2);border-color:rgba(123,94,167,.3)}
.bg2{background:rgba(14,164,114,.12);color:var(--green2);border-color:rgba(14,164,114,.25)}
.ba{background:rgba(217,119,6,.12);color:var(--amber2);border-color:rgba(217,119,6,.25)}
.br{background:rgba(220,38,38,.12);color:var(--red2);border-color:rgba(220,38,38,.25)}
.li{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--b1)}
.li:last-child{border:none}
.chk{width:20px;height:20px;min-width:20px;border-radius:50%;border:2px solid var(--b3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .2s}
.chk.done{background:var(--green);border-color:var(--green);color:#fff}
.streak{font-size:12px;font-weight:700;color:var(--amber2);font-family:'JetBrains Mono',monospace}
/* Dashboard v2 */
.xp-bar-wrap{height:6px;background:var(--s3);border-radius:99px;overflow:hidden;margin:6px 0 2px}
.xp-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--brand),#a78bfa);transition:width .8s ease}
.mission-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--b1)}
.mission-item:last-child{border-bottom:none}
.mission-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:var(--s2)}
.mission-done .mission-icon{background:var(--green)22;border:1px solid var(--green)44}
.mission-done .mission-title{text-decoration:line-through;color:var(--t3)}
.streak-fire{display:flex;align-items:center;gap:4px;font-family:'Syne',sans-serif;font-weight:800}
.streak-fire span{font-size:20px}
.level-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;background:linear-gradient(135deg,var(--brand),#a78bfa);font-size:11px;font-weight:700;color:#fff}
.div{height:1px;background:var(--b1);margin:14px 0}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r3);padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:mop .2s ease}
@keyframes mop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.mt{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;margin-bottom:4px}
.ms{font-size:12px;color:var(--t3);margin-bottom:20px}
.ma{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.insight{background:linear-gradient(135deg,rgba(123,94,167,.1),rgba(192,132,252,.05));border:1px solid rgba(123,94,167,.22);border-radius:var(--r2);padding:18px}
.ih{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.il{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#C084FC}
.it{font-size:13px;line-height:1.7;color:var(--t2)}
.fc-wrap{perspective:1200px;height:200px;cursor:pointer}
.fc-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s}
.fc-wrap.fl .fc-inner{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r2);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.fc-fr{background:var(--s2);border:1px solid var(--b2)}
.fc-bk{background:rgba(123,94,167,.12);border:1px solid rgba(123,94,167,.3);transform:rotateY(180deg)}
.fc-ht{font-size:10px;color:var(--t4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.fc-tx{font-size:16px;font-weight:600;line-height:1.5}
.fsrs{display:flex;gap:8px;margin-top:12px}
.fsrs-btn{flex:1;padding:8px 4px;border-radius:var(--r);border:1px solid var(--b2);background:var(--s2);color:var(--t1);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;text-align:center}
.fa{border-color:var(--red2);color:var(--red2)}.fh{border-color:var(--amber2);color:var(--amber2)}.fg{border-color:var(--green2);color:var(--green2)}.fe{border-color:var(--brand2);color:var(--brand2)}
.fa:hover{background:rgba(220,38,38,.1)}.fh:hover{background:rgba(217,119,6,.1)}.fg:hover{background:rgba(14,164,114,.1)}.fe:hover{background:rgba(123,94,167,.1)}
.pomo{width:140px;height:140px;border-radius:50%;border:5px solid var(--b2);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto}
.pt{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:700}
.pl{font-size:10px;color:var(--t3);margin-top:2px}
.chat-msgs{display:flex;flex-direction:column;gap:12px;max-height:360px;overflow-y:auto;padding:4px 0}
.msg{display:flex;gap:8px;align-items:flex-start}
.msg.u{flex-direction:row-reverse}
.mav{width:26px;height:26px;min-width:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.mav.ai{background:rgba(123,94,167,.2);border:1px solid rgba(123,94,167,.3);color:var(--brand2)}
.mav.usr{background:var(--s3);color:var(--t2)}
.mbub{max-width:78%;padding:10px 13px;border-radius:var(--r2);font-size:13px;line-height:1.6;background:var(--s2);border:1px solid var(--b1)}
.msg.u .mbub{background:rgba(123,94,167,.12);border-color:rgba(123,94,167,.2)}
.tx-it{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--b1)}
.tx-it:last-child{border:none}
.tx-ic{width:34px;height:34px;min-width:34px;border-radius:10px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:16px}
.nc{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:14px;cursor:pointer;transition:all .15s}
.nc:hover{border-color:var(--b3);transform:translateY(-2px)}
.ntl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--t4);margin-bottom:6px}
.nti{font-size:14px;font-weight:600;margin-bottom:5px}
.npv{font-size:11px;color:var(--t3);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sb-bars{display:flex;align-items:flex-end;gap:6px;height:90px}
.sb-b{width:100%;border-radius:4px 4px 0 0;min-height:4px}
.hm{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.hmc{height:16px;border-radius:3px;cursor:pointer}
.med-t{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 8px;border-radius:6px;background:var(--s2);border:1px solid var(--b2);cursor:pointer;transition:all .15s}
.med-t.tk{background:rgba(14,164,114,.1);border-color:var(--green);color:var(--green2)}
#toast-c{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--s2);border:1px solid var(--b3);border-radius:var(--r2);padding:12px 16px;font-size:13px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.5);animation:ts .2s ease;pointer-events:all;max-width:320px}
@keyframes ts{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.toast.ok{border-color:rgba(14,164,114,.3)}.toast.err{border-color:rgba(220,38,38,.3)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 16px;text-align:center;color:var(--t3)}
.ei{font-size:36px;margin-bottom:10px;opacity:.4}
.et{font-size:13px;margin-bottom:4px}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--t3);gap:10px}
.spin{width:20px;height:20px;border:2px solid var(--b3);border-top-color:var(--brand2);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b3);border-radius:2px}

/* ══ V1.5 IDENTITY OVERRIDE ══════════════════════════════ */
:root {
  --bg:#0C0C0F; --s1:#111115; --s2:#16161B; --s3:#1C1C22; --s4:#222229;
  --b1:#1E1E26; --b2:#28282F; --b3:#323239;
  --wine:#6B1A2A; --wine2:#8B2635; --ruby:#C0392B; --ruby2:#E74C3C;
  --glow:rgba(139,38,53,.35);
  --t1:#F0F0F5; --t2:#A0A0B0; --t3:#606070; --t4:#3A3A48;
  --green:#1A6B3A; --green2:#27AE60; --green3:#2ECC71;
  --amber:#B7770D; --amber2:#E8A020;
  --blue2:#4A90D9; --pink2:#C0607A;
}
body { background:var(--bg) !important; }
/* Auth background */
#auth-screen { background:var(--bg) !important; background-image:radial-gradient(ellipse at 20% 50%,rgba(139,38,53,.08),transparent 60%) !important; }
.auth-box { background:var(--s1) !important; border-color:var(--b2) !important; }
/* Sidebar wine accent */
.ni.on { background:rgba(139,38,53,.18) !important; border-color:rgba(139,38,53,.3) !important; }
.ni.on svg { color:var(--ruby2) !important; }
.sb-mark { background:linear-gradient(135deg,var(--wine2),var(--ruby)) !important; box-shadow:0 0 14px var(--glow) !important; }
/* Buttons */
.bp { background:var(--wine2) !important; }
.bp:hover { background:var(--ruby) !important; box-shadow:0 4px 14px var(--glow) !important; }
/* Avatar */
.av { background:linear-gradient(135deg,var(--wine2),var(--ruby)) !important; border:1.5px solid rgba(139,38,53,.4) !important; }
/* Insight */
.insight { background:linear-gradient(135deg,rgba(139,38,53,.12),rgba(107,26,42,.06)) !important; border-color:rgba(139,38,53,.25) !important; }
.il { color:var(--ruby2) !important; }
/* Progress wine */
.pf { background:var(--wine2); }
/* Badges */
.bb { background:rgba(139,38,53,.15) !important; color:#D4798A !important; border-color:rgba(139,38,53,.3) !important; }
/* Cards left accent */
.card-wine { border-left:2px solid var(--wine2) !important; }
/* Auth mark */
.auth-mark { background:linear-gradient(135deg,var(--wine2),var(--ruby)) !important; box-shadow:0 0 24px var(--glow) !important; }
/* Flashcard back */
.fc-bk { background:rgba(139,38,53,.1) !important; border-color:rgba(139,38,53,.3) !important; }
/* Toast info */
.toast.info { border-color:rgba(139,38,53,.3) !important; }
/* Stats wine */
.stat { border-left:1px solid var(--b1); }
/* Sidebar version label */
.sb-version { font-size:8px; color:var(--wine2); font-family:'JetBrains Mono',monospace; margin-left:3px; }
/* Decision center items */
.dc-item { display:flex; align-items:flex-start; gap:11px; padding:10px 13px; border-radius:10px; background:var(--s2); border:1px solid var(--b1); border-left:3px solid var(--b3); cursor:pointer; transition:all .12s; margin-bottom:6px; }
.dc-item:hover { border-color:var(--wine2); background:var(--s3); }
.dc-item.high { border-left-color:var(--ruby2) !important; }
.dc-item.med  { border-left-color:var(--amber2) !important; }
.dc-item.low  { border-left-color:var(--green2) !important; }
.dc-num { font-family:'Syne',sans-serif; font-weight:800; font-size:16px; color:var(--t4); width:22px; flex-shrink:0; }
.dc-title { font-size:12px; font-weight:600; margin-bottom:2px; }
.dc-sub { font-size:10px; color:var(--t3); }
/* Stock bar */
.stock-bar { height:5px; background:var(--s3); border-radius:99px; overflow:hidden; margin-top:4px; }
.stock-fill { height:100%; border-radius:99px; }
/* Book card */
.book-card { background:transparent; border:none; padding:0; cursor:pointer; transition:all .2s; display:flex; flex-direction:column; width:100%; perspective:600px; }
.book-card:hover { transform:translateY(-4px); }
.book-card:hover .book-3d { transform:rotateY(-8deg); box-shadow:-8px 8px 24px rgba(0,0,0,.5); }
.book-3d { position:relative; border-radius:2px 8px 8px 2px; overflow:hidden; transform-origin:left center; transition:transform .2s, box-shadow .2s; box-shadow:-4px 4px 14px rgba(0,0,0,.4); }
.book-spine { position:absolute; left:0; top:0; width:8px; height:100%; background:rgba(0,0,0,.35); border-radius:2px 0 0 2px; z-index:2; }
.book-shine { position:absolute; top:0; left:8px; width:18px; height:100%; background:linear-gradient(to right,rgba(255,255,255,.12),transparent); z-index:2; pointer-events:none; }
.book-card:hover { border-color:var(--brand); transform:translateY(-3px); box-shadow:0 8px 28px rgba(123,94,167,.18); }
.book-cover { width:100%; height:170px; display:flex; align-items:center; justify-content:center; font-size:40px; flex-shrink:0; position:relative; }
.book-cover-done::after { content:'✓'; position:absolute; top:8px; right:8px; width:22px; height:22px; background:var(--green); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; color:#fff; font-weight:700; }
.book-body { padding:8px 10px 10px; display:flex; flex-direction:column; flex:1; background:var(--s1); }
.book-pct { font-size:20px; font-weight:800; font-family:'Syne',sans-serif; color:var(--t1); line-height:1; margin-bottom:2px; }
.book-prog-bar { height:6px; background:var(--s3); border-radius:99px; overflow:hidden; margin:8px 0 10px; }
.book-prog-fill { height:100%; border-radius:99px; transition:width .6s ease; }
/* Progress Ring */
.ring-wrap { display:flex; flex-direction:column; align-items:center; gap:4px; }
.ring-label { font-size:9px; color:var(--t3); text-align:center; letter-spacing:.05em; }
.ring-pct { font-size:13px; font-weight:800; font-family:'Syne',sans-serif; fill:var(--t1); }
.ring-sub { font-size:7px; fill:var(--t3); }
/* Avaliação por estrelas */
.star-row { display:flex; gap:3px; margin-top:6px; }
.star { font-size:14px; cursor:pointer; color:var(--t4); transition:color .1s; }
.star.on { color:#F59E0B; }
.book-tags { display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; }
.book-tag { font-size:9px; padding:2px 7px; border-radius:99px; background:var(--s3); color:var(--t3); border:1px solid var(--b2); }
/* Evolution */
.evo-bar { height:7px; background:var(--s3); border-radius:99px; overflow:hidden; margin:7px 0 3px; }
.evo-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--wine2),var(--ruby2)); }
.evo-area { padding:9px 12px; border-radius:10px; background:var(--s2); border:1px solid var(--b1); margin-bottom:6px; display:flex; align-items:center; gap:11px; }
/* Disc card */
.disc-card { background:var(--s1); border:1px solid var(--b1); border-radius:14px; padding:13px; transition:all .12s; cursor:pointer; margin-bottom:8px; }
.disc-card:hover { border-color:var(--b3); }
.disc-bar { height:3px; border-radius:99px; margin-bottom:9px; }
/* Notif panel */
#notif-panel { display:none; position:absolute; top:50px; right:16px; width:300px; background:var(--s1); border:1px solid var(--b2); border-radius:14px; z-index:200; box-shadow:0 12px 40px rgba(0,0,0,.7); max-height:400px; overflow-y:auto; }
#notif-panel.on { display:block; }
.notif-head { padding:11px 13px; border-bottom:1px solid var(--b1); display:flex; align-items:center; justify-content:space-between; }
.notif-item { padding:10px 13px; border-bottom:1px solid var(--b1); cursor:pointer; transition:all .12s; }
.notif-item:hover { background:var(--s2); }
.notif-item.unread { border-left:2px solid var(--ruby2); }
.ni-title { font-size:11px; font-weight:600; margin-bottom:2px; }
.ni-desc { font-size:10px; color:var(--t3); }
.ni-time { font-size:9px; color:var(--t4); font-family:'JetBrains Mono',monospace; margin-top:2px; }
.notif-dot { position:absolute; top:3px; right:3px; width:7px; height:7px; border-radius:50%; background:var(--ruby); border:1.5px solid var(--s1); display:none; }
.notif-dot.on { display:block; }


/* ── Conquistas ── */
.achievement-card{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--b1)}
.achievement-card:last-child{border-bottom:none}
.ach-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:linear-gradient(135deg,var(--brand),#a78bfa)}
.ach-icon.locked{background:var(--s3);filter:grayscale(1);opacity:.4}
.ach-new{animation:achPop .5s ease}
@keyframes achPop{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}

/* ── Matérias ── */
.subject-card{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:14px;cursor:pointer;transition:all .18s}
.subject-card:hover{border-color:var(--brand);transform:translateY(-2px)}
.subject-level{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--s3);color:var(--t2)}

/* ── Streak visual ── */
.streak-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.streak-day{height:22px;border-radius:4px;background:var(--s3)}
.streak-day.done{background:var(--brand)}
.streak-day.today{background:var(--brand2);box-shadow:0 0 6px var(--glow)}

/* ── Loja NeurOS ── */
.shop-section{margin-bottom:20px}
.shop-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--s1);border:1px solid var(--b1);border-radius:14px;margin-bottom:8px;transition:all .15s}
.shop-item:hover{border-color:var(--brand)}
.shop-item-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.coin-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--amber2)}
.coin-bal{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;color:var(--amber2)}
.reward-card{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.reward-card.redeemed{opacity:.5}
.theme-card{background:var(--s1);border:2px solid var(--b1);border-radius:14px;padding:14px;cursor:pointer;transition:all .18s;text-align:center}
.theme-card.active{border-color:var(--brand);background:var(--brand)11}
.theme-card:hover{border-color:var(--brand2)}

/* ── Celebração / Confetti ── */
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden}
.confetti-piece{position:absolute;width:8px;height:8px;border-radius:2px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* ── Level Up Overlay ── */
.level-up-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9998;display:flex;align-items:center;justify-content:center;animation:fadeIn .3s ease}
.level-up-card{background:var(--s1);border:1px solid var(--brand);border-radius:24px;padding:36px 28px;text-align:center;max-width:300px;width:90%;animation:scaleIn .4s ease}
@keyframes scaleIn{0%{transform:scale(.7);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── Avatar ── */
.avatar-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.avatar-circle{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--brand),#a78bfa);display:flex;align-items:center;justify-content:center;font-size:32px;border:3px solid var(--brand2);box-shadow:0 0 20px var(--glow)}
.avatar-title{font-size:11px;font-weight:700;color:var(--brand2);letter-spacing:.05em}

/* ── Avatar RPG ── */
.avatar-rpg-wrap{display:flex;flex-direction:column;align-items:center;gap:0}
.avatar-rpg-svg{filter:drop-shadow(0 4px 16px rgba(123,94,167,.4))}
.avatar-rpg-svg:hover{filter:drop-shadow(0 6px 24px rgba(167,139,250,.6))}
.equip-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.equip-slot{background:var(--s2);border:1px solid var(--b2);border-radius:12px;padding:10px;text-align:center;cursor:pointer;transition:all .18s;position:relative}
.equip-slot:hover{border-color:var(--brand)}
.equip-slot.active{border-color:var(--brand2);background:var(--brand)11}
.equip-slot.locked{opacity:.45;cursor:not-allowed}
.equip-slot-icon{font-size:24px;display:block;margin-bottom:4px}
.equip-slot-name{font-size:9px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.equip-slot-cost{position:absolute;top:4px;right:4px;font-size:9px;font-weight:700;color:var(--amber2)}
.avatar-page-wrap{display:flex;flex-direction:column;align-items:center}

/* ── Dashboard RPG Style ── */
.dash-hero{background:linear-gradient(160deg,#0d0d1a 0%,#1a0a2e 50%,#0d1a2e 100%);border-radius:18px;padding:16px;margin-bottom:12px;position:relative;overflow:hidden;border:1px solid rgba(123,94,167,.3)}
.dash-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(123,94,167,.15) 0%,transparent 70%);pointer-events:none}
.dash-char-section{display:flex;align-items:stretch;gap:0}
.dash-char-left{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:100px;padding-right:14px;border-right:1px solid rgba(255,255,255,.07)}
.dash-char-right{flex:1;padding-left:14px;display:flex;flex-direction:column;justify-content:center;gap:6px}
.dash-level-num{font-family:'Syne',sans-serif;font-weight:900;font-size:36px;color:var(--t1);line-height:1}
.dash-xp-bar{height:4px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden}
.dash-xp-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--brand),#a78bfa);transition:width 1s ease}
.dash-metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:12px}
.dash-metric{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:8px 10px;display:flex;align-items:center;gap:8px}
.dash-metric-val{font-size:15px;font-weight:800;font-family:'Syne',sans-serif}
.dash-metric-lbl{font-size:9px;color:var(--t4);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
/* ── Avatar RPG ── */
.avatar-rpg-svg{filter:drop-shadow(0 4px 16px rgba(123,94,167,.4))}
.equip-slot{background:var(--s2);border:1px solid var(--b2);border-radius:12px;padding:10px;text-align:center;cursor:pointer;transition:all .18s}
.equip-slot:hover{border-color:var(--brand)}
.equip-slot.active{border-color:var(--brand2);background:var(--brand)11}
/* ── Celebração ── */
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden}
.confetti-piece{position:absolute;width:8px;height:8px;border-radius:2px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.level-up-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9998;display:flex;align-items:center;justify-content:center;animation:fadeIn .3s ease}
.level-up-card{background:var(--s1);border:1px solid var(--brand);border-radius:24px;padding:36px 28px;text-align:center;max-width:300px;width:90%;animation:scaleIn .4s ease}
@keyframes scaleIn{0%{transform:scale(.7);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>
    

<!-- ══ AUTH SCREEN ════════════════════════════════════════════ -->
<div id="auth-screen" style="display:flex">
  <div class="auth-box">
    <div class="auth-logo"><div class="auth-mark">N</div><span class="auth-name">NeuroOS</span></div>
    <div class="auth-tabs">
      <div class="auth-tab on" id="tab-login" onclick="switchTab('login')">Entrar</div>
      <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Criar conta</div>
    </div>

    <!-- Login -->
    <div id="form-login">
      <div class="auth-err" id="login-err"></div>
      <button class="oauth-btn" onclick="googleLogin()">
        <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/><path d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        Continuar com Google
      </button>
      <div class="sep">ou</div>
      <div class="auth-form">
        <div class="ir"><label>E-mail</label><input class="input" id="login-email" type="email" placeholder="seu@email.com"></div>
        <div class="ir"><label>Senha</label><input class="input" id="login-pw" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
        <button class="btn bp" style="width:100%;justify-content:center" onclick="doLogin()" id="login-btn">Entrar →</button>
      </div>
      <p style="text-align:center;font-size:12px;color:var(--t3);margin-top:14px">
        <a href="#" onclick="showForgot()" style="color:var(--brand2)">Esqueceu a senha?</a>
      </p>
    </div>

    <!-- Register -->
    <div id="form-register" style="display:none">
      <div class="auth-err" id="reg-err"></div>
      <button class="oauth-btn" onclick="googleLogin()">
        <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/><path d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        Cadastrar com Google
      </button>
      <div class="sep">ou</div>
      <div class="auth-form">
        <div class="ir"><label>Nome completo</label><input class="input" id="reg-name" placeholder="Seu nome"></div>
        <div class="ir"><label>E-mail</label><input class="input" id="reg-email" type="email" placeholder="seu@email.com"></div>
        <div class="ir"><label>Senha (mín. 6 caracteres)</label><input class="input" id="reg-pw" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doRegister()"></div>
        <button class="btn bp" style="width:100%;justify-content:center" onclick="doRegister()" id="reg-btn">Criar minha conta →</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ APP ════════════════════════════════════════════════════ -->
<div id="app">
  <aside id="sidebar">
    <div class="sb-logo">
      <div class="sb-mark">N</div>
      <span class="sb-nm">NeuroOS</span>
    </div>
    <nav class="sb-nav" id="nav"></nav>
    <div class="sb-foot">
      <div class="ni" onclick="go('decision')">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/></svg>
        <span class="ni-lbl">Central de Decisão</span>
      </div>
      <div class="ni" onclick="go('library')">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/></svg>
        <span class="ni-lbl">Biblioteca</span>
      </div>
      <div class="ni" onclick="go('ia')">
        <svg fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24"><path d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg>
        <span class="ni-lbl">IA Assistente</span>
      </div>
    </div>
  </aside>
  <div id="main">
    <header id="topbar">
      <button id="tb-tog" onclick="toggleSB()"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
      <span id="tb-title">Dashboard</span>
      <span style="flex:1"></span>
      <span id="tb-date"></span>
      <span id="coins-bal" onclick="go('shop')" style="font-size:11px;font-weight:700;color:var(--amber2);cursor:pointer;padding:4px 8px;border-radius:8px;background:var(--s2)" title="Loja">🪙 <span id="coins-count">0</span></span>
      <button class="notif-btn" onclick="toggleNotif()" id="notif-btn" style="position:relative;background:none;border:none;cursor:pointer;color:var(--t3);padding:5px;border-radius:7px;display:flex;transition:all .12s">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"/></svg>
        <div class="notif-dot" id="ndot"></div>
      </button>
      <div class="av" id="uav" onclick="toggleAvMenu()" style="overflow:hidden;padding:0;background:transparent;border:2px solid var(--brand)">
        <div class="av-menu" id="av-menu">
          <div style="padding:12px;border-bottom:1px solid var(--b1);margin-bottom:4px;text-align:center">
            <div id="av-emoji" style="font-size:30px;margin-bottom:4px">🌱</div>
            <div style="font-size:13px;font-weight:700" id="av-name">—</div>
            <div style="font-size:10px;color:var(--t3)" id="av-email">—</div>
            <div id="av-level-info" style="margin-top:6px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap">
              <span class="level-badge" id="av-level-badge">Nível 1</span>
              <span id="av-title-badge" style="font-size:10px;color:var(--brand2);font-weight:600">Calouro</span>
            </div>
          </div>
          <div class="av-menu-item" onclick="go('avatar')">⚔️ Personagem</div>
          <div class="av-menu-item" onclick="go('shop')">🪙 Loja</div>
          <div class="av-menu-item" onclick="go('achievements')">🏆 Conquistas</div>
          <div class="av-menu-item" onclick="go('settings')">⚙️ Configurações</div>
          <div class="av-menu-item" onclick="doLogout()" style="color:var(--red2)">→ Sair</div>
        </div>
      </div>
    </header>
    
    <!-- NOTIF PANEL -->

// ════════════════════════════════════════════
// PROGRESS RING — helper SVG circular
// ════════════════════════════════════════════
function ring(pct, size=64, stroke=5, color='var(--brand)', sublabel=''){
  const r=Math.max(1,(size-stroke*2)/2)
  const circ=2*Math.PI*r
  const off=circ-Math.min(100,pct)/100*circ
  const cx=size/2, cy=size/2
  const col=pct>=100?'var(--green)':pct>=75?'#8B5CF6':pct>=40?'var(--brand)':color
  return`<svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--s3)" stroke-width="${stroke}"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${col}" stroke-width="${stroke}"
      stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${off}"
      style="transition:stroke-dashoffset .6s ease"/>
    <text x="${cx}" y="${cy+1}" text-anchor="middle" dominant-baseline="middle"
      style="transform:rotate(90deg);transform-origin:${cx}px ${cy}px">
      <tspan class="ring-pct" x="${cx}" dy="-3">${Math.round(pct)}</tspan>
      <tspan class="ring-sub" x="${cx}" dy="10">%${sublabel?'·'+sublabel:''}</tspan>
    </text>
  </svg>`
}

async function qChk(habitId,isDone){
  if(isDone==='true'){
    await SB.from('habit_logs').delete().eq('habit_id',habitId).eq('log_date',today())
    toast('Check-in removido')
  } else {
    await SB.from('habit_logs').upsert({habit_id:habitId,user_id:USER.id,log_date:today()},{onConflict:'habit_id,log_date'})
    // Calcular streak
    let streak=0
    for(let i=0;i<90;i++){
      const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().split('T')[0]
      const {count}=await SB.from('habit_logs').select('id',{count:'exact',head:true}).eq('habit_id',habitId).eq('log_date',ds)
      if(count>0)streak++;else break
    }
    await SB.from('habits').update({streak}).eq('id',habitId)
    toast('Hábito concluído! ✓')
    awardCoins(5,'hábito').catch(()=>{})
  }
  render('dashboard')
}

function fmtS(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}

function flipCard(){
  if(!curCard)return;flipped=!flipped
  document.getElementById('fc').classList.toggle('fl',flipped)
  const r=document.getElementById('fsrs-row');r.style.opacity=flipped?'1':'.3';r.style.pointerEvents=flipped?'auto':'none'

async function rate(rating){
  if(!curCard)return
  const f=curCard
  const gr={AGAIN:1,HARD:2,GOOD:3,EASY:4}[rating]
  let S=f.fsrs_stability||0,reps=f.fsrs_reps||0,lapses=f.fsrs_lapses||0,state=f.state||'NEW'
  if(state==='NEW'||state==='LEARNING'){S=[1,1.5,3.5,8][gr-1];state=gr<4?'LEARNING':'REVIEW'}
  else if(gr===1){lapses++;S=Math.max(.5,S*.3);state='RELEARNING'}
  else{reps++;S=S*(1+Math.exp(.9)*(11-Math.min(S,10))*Math.pow(S,-.2)*(Math.exp(.12*(1-.9))-1)*[1,.7,1,1.3][gr-1]);state='REVIEW'}
  const days=Math.max(1,Math.round(S)),due=new Date();due.setDate(due.getDate()+days)
  await SB.from('flashcards').update({state,fsrs_due:due.toISOString(),fsrs_stability:S,fsrs_reps:reps,fsrs_lapses:lapses}).eq('id',f.id)
  await SB.from('flashcard_reviews').insert({flashcard_id:f.id,user_id:USER.id,rating,state_after:state,due_after:due.toISOString()})
  toast(`Próxima revisão: ${days} dia${days>1?'s':''}`)
  pgStudies()
}

async function pgLibrary(){
  const[{data:books},{data:rlogs}]=await Promise.all([
    SB.from('books').select('*').eq('user_id',USER.id).order('updated_at',{ascending:false}),
    SB.from('reading_logs').select('book_id,pages_read').eq('user_id',USER.id).eq('log_date',today()),
  ])
  const bks=books||[],rl=rlogs||[]
  const reading=bks.filter(b=>b.status==='READING')
  const done=bks.filter(b=>b.status==='DONE')
  const favs=bks.filter(b=>b.favorite)
  const EMOJIS={Filosofia:'🏛',Psicologia:'🧠',Direito:'⚖',Ciência:'🔬',História:'📜',Ficção:'📕',Autoajuda:'💡',Tecnologia:'💻',Negócios:'📊',Geral:'📚'}
  const COVERS={
    Filosofia:'linear-gradient(135deg,#2D1B69,#4C1D95)',
    Psicologia:'linear-gradient(135deg,#1E3A5F,#1D4ED8)',
    Direito:'linear-gradient(135deg,#3B0764,#7B5EA7)',
    Ciência:'linear-gradient(135deg,#064E3B,#059669)',
    História:'linear-gradient(135deg,#451A03,#92400E)',
    Ficção:'linear-gradient(135deg,#4A044E,#A21CAF)',
    Autoajuda:'linear-gradient(135deg,#1C1917,#78716C)',
    Tecnologia:'linear-gradient(135deg,#0C4A6E,#0284C7)',
    Negócios:'linear-gradient(135deg,#14532D,#16A34A)',
    Geral:'linear-gradient(135deg,#1E1B4B,#4338CA)'
  }
  window._EMOJIS=EMOJIS
  function renderBks(list){
    if(!list.length) return'<div class="empty" style="grid-column:1/-1"><div class="ei">📚</div><div class="et">Nenhum livro</div></div>'
    return list.map(b=>{
      const pct=b.total_pages?Math.round(b.pages_read/b.total_pages*100):0
      const emoji=EMOJIS[b.category]||'📚'
      const cover=COVERS[b.category]||COVERS['Geral']
      const isDone=b.status==='DONE'
      const fillColor=isDone?'var(--green)':pct>=75?'#8B5CF6':pct>=40?'var(--brand)':'var(--t3)'
      const statusLabel={READING:'Lendo',DONE:'Concluído',PAUSED:'Pausado',WISHLIST:'Lista'}[b.status]||b.status
      const statusClass=isDone?'bg2':b.status==='READING'?'bb':'ba'
      const starsHtml=b.rating?'<span style="color:#F59E0B;font-size:11px">'+'★'.repeat(Math.round(b.rating))+'</span>':''
      const favHtml=b.favorite?'<span style="color:#e11d48;font-size:11px">❤</span>':''
      const seriesHtml=b.series?'<span class="book-tag">📚 '+esc(b.series)+(b.series_volume?' #'+b.series_volume:'')+'</span>':''
      const fmtHtml=b.format?'<span class="book-tag">'+esc(b.format)+'</span>':''
      const coverImg=b.cover_url
        ?'<img src="'+b.cover_url+'" style="width:100%;height:100%;object-fit:cover">'
        :'<span style="font-size:44px">'+emoji+'</span>'
      return'<div class="book-card" onclick="viewBook(\''+b.id+'\')">'
        +'<div class="book-3d">'
        +'<div class="book-spine"></div>'
        +'<div class="book-shine"></div>'
        +'<div class="book-cover '+(isDone?'book-cover-done':'')+'" style="background:'+cover+';padding:0;overflow:hidden">'+coverImg+'</div>'
        +'<div class="book-body">'
        +'<div style="font-size:11px;font-weight:700;line-height:1.3;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(b.title)+'</div>'
        +'<div style="font-size:10px;color:var(--t3);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(b.author||'')+'</div>'
        +'<div style="display:flex;align-items:center;justify-content:space-between;margin-top:auto">'
        +'<span class="badge '+statusClass+'">'+statusLabel+'</span>'
        +ring(pct,36,3,fillColor)
        +'</div>'
        +'<div style="font-size:9px;color:var(--t4);margin-top:4px">'+b.pages_read+'/'+b.total_pages+' págs</div>'
        +(starsHtml||favHtml?'<div style="margin-top:4px;display:flex;gap:3px">'+starsHtml+favHtml+'</div>':'')
        +'</div>'
        +'</div>'
        +'</div>'
    }).join('')
  }
  window._allBooks=bks
  window._renderBks=renderBks
  document.getElementById('content').innerHTML=
    '<div class="g4" style="margin-bottom:14px">'
    +'<div class="stat"><div class="sl">Lendo</div><div class="sv" style="color:var(--brand2)">'+reading.length+'</div></div>'
    +'<div class="stat"><div class="sl">Concluídos</div><div class="sv" style="color:var(--green2)">'+done.length+'</div></div>'
    +'<div class="stat"><div class="sl">Favoritos</div><div class="sv" style="color:#e11d48">'+favs.length+'</div></div>'
    +'<div class="stat"><div class="sl">Págs hoje</div><div class="sv">'+rl.reduce((s,x)=>s+x.pages_read,0)+'</div></div>'
    +'</div>'
    +'<div class="sh" style="margin-bottom:10px"><div><h2>Biblioteca</h2></div>'
    +'<button class="btn bp bsm" onclick="modalBook()">+ Livro</button></div>'
    +'<div style="display:flex;gap:0;margin-bottom:14px;background:var(--s2);border-radius:10px;padding:3px;overflow-x:auto">'
    +'<button onclick="filterBks(\'ALL\'  )" id="btab-ALL"   style="flex:1;min-width:60px;padding:7px 4px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:600;background:var(--s1);color:var(--t1)">Todos</button>'
    +'<button onclick="filterBks(\'Livro\')" id="btab-Livro" style="flex:1;min-width:60px;padding:7px 4px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:600;background:transparent;color:var(--t3)">📖 Livro</button>'
    +'<button onclick="filterBks(\'Ebook\')" id="btab-Ebook" style="flex:1;min-width:60px;padding:7px 4px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:600;background:transparent;color:var(--t3)">📱 Ebook</button>'
    +'<button onclick="filterBks(\'Audio\')" id="btab-Audio" style="flex:1;min-width:60px;padding:7px 4px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:600;background:transparent;color:var(--t3)">🎧 Áudio</button>'
    +'<button onclick="filterBks(\'FAV\')"   id="btab-FAV"   style="flex:1;min-width:60px;padding:7px 4px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:600;background:transparent;color:var(--t3)">❤ Favs</button>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px" id="bg">'+renderBks(bks)+'</div>'
}

function filterBks(tab){
  tab=tab||window._activeLibTab||'ALL'
  window._activeLibTab=tab
  const g=document.getElementById('bg')
  if(!g||!window._allBooks||!window._renderBks)return
  // Highlight aba ativa
  ['ALL','Livro','Ebook','Audio','FAV'].forEach(t=>{
    const el=document.getElementById('btab-'+t)
    if(!el)return
    el.style.background=t===tab?'var(--s1)':'transparent'
    el.style.color=t===tab?'var(--t1)':'var(--t3)'
  })
  let filtered=window._allBooks
  if(tab==='FAV') filtered=filtered.filter(b=>b.favorite)
  else if(tab==='Livro') filtered=filtered.filter(b=>!b.format||b.format==='Livro')
  else if(tab==='Ebook') filtered=filtered.filter(b=>b.format&&b.format.toLowerCase().includes('ebook'))
  else if(tab==='Audio') filtered=filtered.filter(b=>b.format&&b.format.toLowerCase().includes('audio'))
  g.innerHTML=window._renderBks(filtered)
}

// Upload de capa para Supabase Storage — corrigido para usar ID real
async function uploadCover(file, bookId){
  if(!file||!bookId){return null}
  const ext=file.name.split('.').pop().toLowerCase()
  const path=`${USER.id}/${bookId}.${ext}`
  // Remove arquivo antigo se existir (upsert)
  await SB.storage.from('book-covers').remove([path]).catch(()=>{})
  const{error}=await SB.storage.from('book-covers').upload(path,file,{upsert:true,contentType:file.type})
  if(error){console.error('Cover upload error:',error);toast('Erro no upload da capa','err');return null}
  // Força cache-bust adicionando timestamp
  const{data:pub}=SB.storage.from('book-covers').getPublicUrl(path)
  return pub.publicUrl+'?t='+Date.now()
}

function prevCover(input, targetId){
  const file=input.files?.[0];if(!file)return
  const reader=new FileReader()
  reader.onload=e=>{
    const el=document.getElementById(targetId)
    if(el) el.innerHTML=`<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;border-radius:8px">`
  }
  reader.readAsDataURL(file)
}

async function saveBook(){
  const ti=document.getElementById('bti2').value.trim()
  if(!ti){toast('Informe o título','err');return}
  const now=new Date().toISOString()
  const status=document.getElementById('bst4').value
  const finishedAt=status==='DONE'?(document.getElementById('bfd2').value||today()):null
  const coverFile2=document.getElementById('cover-inp2')?.files?.[0]
  // 1. Inserir livro primeiro para obter o ID real
  const{data:inserted,error:insertErr}=await SB.from('books').insert({
    user_id:USER.id,
    title:ti,
    author:document.getElementById('bau2').value||null,
    category:document.getElementById('bca2').value,
    total_pages:+document.getElementById('bpg2').value||0,
    pages_read:0,
    daily_goal:+document.getElementById('bdg2').value||20,
    status,
    format:document.getElementById('bfm2').value||null,
    series:document.getElementById('bsr2').value||null,
    series_volume:+document.getElementById('bvl2').value||null,
    origin:document.getElementById('bor2').value||null,
    rating:window._starRating||null,
    favorite:document.getElementById('bfv2').checked,
    finished_at:finishedAt,
    cover_url:null,
    started_at:today(),
    created_at:now,
    updated_at:now
  }).select('id').single()
  if(insertErr||!inserted?.id){console.error('Insert error:',insertErr);toast('Erro ao salvar','err');return}
  // 2. Upload da capa com o ID real do livro recém-criado
  if(coverFile2){
    const url=await uploadCover(coverFile2,inserted.id)
    if(url){
      await SB.from('books').update({cover_url:url,updated_at:new Date().toISOString()}).eq('id',inserted.id)
    }
  }
  cm();toast('Livro adicionado!');render('library')
}

async function editStage(stageId, currentStatus, completedAt, journeyId){
  const isDone = currentStatus === 'DONE'
  openModal(`
<div class="mt">Editar Etapa</div>
<div class="ir">
  <label>Status</label>
  <div style="display:flex;gap:8px;margin-top:4px">
    <button id="est-done" onclick="selStageStatus('DONE')" class="btn ${isDone?'bp':'bg'}" style="flex:1">✓ Concluído</button>
    <button id="est-pend" onclick="selStageStatus('PENDING')" class="btn ${!isDone?'bp':'bg'}" style="flex:1">○ Pendente</button>
  </div>
</div>
<div class="ir" id="est-date-wrap">
  <label>Data de conclusão</label>
  <input class="input" id="est-date" type="date" value="${completedAt||''}">
</div>
<div class="ma">
  <button class="btn bg" onclick="cm();viewJourney('${journeyId}')">Cancelar</button>
  <button class="btn bp" onclick="saveStageEdit('${stageId}','${journeyId}')">Salvar</button>
</div>`)
  window._stageStatus = currentStatus
  // Show/hide date based on initial status
  document.getElementById('est-date-wrap').style.display = isDone ? 'block' : 'none'
}

function selStageStatus(status){
  window._stageStatus = status
  document.getElementById('est-done').className = 'btn ' + (status==='DONE'?'bp':'bg')
  document.getElementById('est-pend').className = 'btn ' + (status==='PENDING'?'bp':'bg')
  document.getElementById('est-date-wrap').style.display = status==='DONE' ? 'block' : 'none'
}

async function saveStageEdit(stageId, journeyId){
  const status = window._stageStatus || 'PENDING'
  const completedAt = status==='DONE' ? (document.getElementById('est-date').value || today()) : null
  await SB.from('journey_stages').update({
    status, completed_at: completedAt,
    updated_at: new Date().toISOString()
  }).eq('id', stageId)
  // Recalcular progresso da jornada
  const{data:allStages}=await SB.from('journey_stages').select('status').eq('journey_id',journeyId)
  const done=(allStages||[]).filter(s=>s.status==='DONE').length
  const total=(allStages||[]).length
  await SB.from('journeys').update({
    current_stage:done,
    status:done>=total?'DONE':'ACTIVE',
    updated_at:new Date().toISOString()
  }).eq('id',journeyId)
  cm()
  toast('Etapa atualizada!')
  viewJourney(journeyId)
}


async function deleteJourney(id){
  if(!confirm('Apagar esta jornada e todas as etapas?'))return
  await SB.from('journey_stages').delete().eq('journey_id',id)
  await SB.from('journeys').delete().eq('id',id)
  cm();toast('Jornada apagada');pgStudies('journey')
}

function selJColor(c){
  document.getElementById('jcol').value=c
  document.querySelectorAll('#jcolors div').forEach(d=>{
    d.style.border=d.dataset.color===c?'2px solid #fff':'2px solid transparent'
  })
}

function getDefaultStages(type){
  const map={
    escola:['1º Ano','2º Ano','3º Ano','4º Ano','5º Ano','6º Ano','7º Ano','8º Ano','9º Ano'],
    faculdade:['1º Semestre','2º Semestre','3º Semestre','4º Semestre','5º Semestre','6º Semestre','7º Semestre','8º Semestre','9º Semestre','10º Semestre'],
    concurso:['Fundamentos','Base Teórica','Questões','Simulados','Revisão Final'],
    idioma:['A1 — Iniciante','A2 — Básico','B1 — Intermediário','B2 — Intermediário Avançado','C1 — Avançado','C2 — Proficiente'],
    curso:['Módulo 1','Módulo 2','Módulo 3','Conclusão'],
    personalizada:['Etapa 1','Etapa 2','Etapa 3']
  }
  return map[type]||map.personalizada
}

function updateJourneyStages(){
  const type=document.getElementById('jty')?.value||'faculdade'
  const stages=getDefaultStages(type)
  const el=document.getElementById('jstages-preview')
  if(el) el.innerHTML=`<div style="font-size:11px;color:var(--t3);margin-bottom:6px">Etapas geradas automaticamente (${stages.length}):</div><div style="display:flex;flex-wrap:wrap;gap:5px">${stages.map(s=>`<span class="book-tag">${s}</span>`).join('')}</div>`
}

async function saveJourney(){
  const ti=document.getElementById('jti').value.trim()
  if(!ti){toast('Informe o título','err');return}
  const type=document.getElementById('jty').value
  const stages=getDefaultStages(type)
  const{data:j,error}=await SB.from('journeys').insert({
    user_id:USER.id,title:ti,type,
    institution:document.getElementById('jin').value||null,
    cover_color:document.getElementById('jcol').value||'#7B5EA7',
    started_at:document.getElementById('jst').value||today(),
    total_stages:stages.length,current_stage:0,status:'ACTIVE'
  }).select('id').single()
  if(error||!j){toast('Erro ao criar','err');return}
  // Criar etapas automaticamente
  const stageRows=stages.map((s,i)=>({journey_id:j.id,user_id:USER.id,title:s,order_index:i,status:i===0?'IN_PROGRESS':'PENDING'}))
  await SB.from('journey_stages').insert(stageRows)
  cm();toast('Jornada criada!');render('journey')
}

async function viewJourney(id){
  const[{data:j},{data:stages}]=await Promise.all([
    SB.from('journeys').select('*').eq('id',id).single(),
    SB.from('journey_stages').select('*').eq('journey_id',id).order('order_index')
  ])
  if(!j)return
  const TYPES={escola:'🏫',faculdade:'🎓',concurso:'⚖',idioma:'🌍',curso:'📜',personalizada:'⚙'}
  const stList=stages||[]
  const pct=j.total_stages>0?Math.round(j.current_stage/j.total_stages*100):0
  openModal(`
<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">

  <div>
    <div class="mt" style="margin:0">${esc(j.title)}</div>
    <div style="font-size:11px;color:var(--t3)">${j.institution?esc(j.institution)+' · ':''}${j.current_stage}/${j.total_stages} etapas</div>
  </div>
  <div style="margin-left:auto">${ring(pct,52,4,j.cover_color)}</div>
</div>
<div style="max-height:340px;overflow-y:auto;padding-right:4px">
  ${stList.map(s=>{
    const done=s.status==='DONE',active=s.status==='IN_PROGRESS'
    return`<div style="padding:10px 0;border-bottom:1px solid var(--b1)">
      <div style="display:flex;align-items:center;gap:10px">
        <div onclick="toggleStage('${s.id}','${s.status}','${j.id}')" style="width:22px;height:22px;border-radius:50%;border:2px solid ${done?'var(--green)':active?j.cover_color:'var(--b2)'};background:${done?'var(--green)':active?j.cover_color+'22':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;cursor:pointer">${done?'✓':active?'●':''}</div>
        <div style="flex:1">
          <div style="font-size:12px;font-weight:${active?700:500};color:${done?'var(--t3)':'var(--t1)'}">${esc(s.title)}</div>
          ${s.completed_at?`<div style="font-size:10px;color:var(--green)">✓ Concluído em ${s.completed_at}</div>`:''}
        </div>
        <button onclick="editStage('${s.id}','${s.status}','${s.completed_at||''}','${j.id}')" style="background:none;border:1px solid var(--b2);border-radius:6px;color:var(--t3);font-size:10px;padding:3px 7px;cursor:pointer">✎</button>
      </div>
    </div>`
  }).join('')}
</div>
<div class="ma"><button class="btn bg" onclick="cm();pgStudies('journey')">Fechar</button></div>`)
}

async function toggleStage(stageId, currentStatus, journeyId){
  const newStatus=currentStatus==='DONE'?'PENDING':'DONE'
  const updates={status:newStatus}
  if(newStatus==='DONE') updates.completed_at=today()
  await SB.from('journey_stages').update(updates).eq('id',stageId)
  // Recalcular progresso da jornada
  const{data:allStages}=await SB.from('journey_stages').select('status').eq('journey_id',journeyId)
  const done=(allStages||[]).filter(s=>s.status==='DONE').length
  const total=(allStages||[]).length
  const jStatus=done>=total?'DONE':'ACTIVE'
  await SB.from('journeys').update({current_stage:done,status:jStatus,updated_at:new Date().toISOString()}).eq('id',journeyId)
  if(newStatus==='DONE'){
    toast('Etapa concluída! ✓')
    launchConfetti(50)
    // Registrar no legado
    const{data:j}=await SB.from('journeys').select('title,type').eq('id',journeyId).single()
    if(j) await SB.from('legacy_events').insert({user_id:USER.id,year:new Date().getFullYear(),title:`Etapa concluída em ${esc(j.title)}`,category:j.type,is_auto:true})
    await checkAndAwardAchievement('journey_stage')
  }
  cm();viewJourney(journeyId)
}

async function pgLegacy(){
  const[{data:events},{data:journeys},{data:profile}]=await Promise.all([
    SB.from('legacy_events').select('*').eq('user_id',USER.id).order('event_date',{ascending:false}),
    SB.from('journeys').select('title,type,status,created_at').eq('user_id',USER.id),
    SB.from('profiles').select('evolution_xp,evolution_level,created_at').eq('id',USER.id).single()
  ])
  const evList=events||[]
  const jList=journeys||[]
  // Agrupar por ano
  const byYear={}
  evList.forEach(e=>{
    const y=e.year||(new Date(e.event_date||e.created_at).getFullYear())
    if(!byYear[y]) byYear[y]=[]
    byYear[y].push(e)
  })
  // Auto-incluir jornadas
  jList.forEach(j=>{
    const y=new Date(j.created_at).getFullYear()
    const label=`Iniciou: ${esc(j.title)}`
    const exists=evList.some(e=>e.title===label)
    if(!exists){
      if(!byYear[y]) byYear[y]=[]
      byYear[y].push({title:label,icon:'🎓',category:j.type,event_date:j.created_at})
    }
  })
  const years=Object.keys(byYear).sort((a,b)=>b-a)
  const p=profile||{}
  document.getElementById('content').innerHTML=`
<div class="sh" style="margin-bottom:18px">
  <div><h2>Legado</h2><p>Sua história registrada</p></div>
  <button class="btn bp bsm" onclick="modalLegacy()">+ Evento</button>
</div>
<div class="card" style="margin-bottom:18px">
  <div class="g4">
    <div class="stat"><div class="sl">XP Total</div><div class="sv" style="color:var(--brand)">${p.evolution_xp||0}</div></div>
    <div class="stat"><div class="sl">Nível</div><div class="sv">${p.evolution_level||1}</div></div>
    <div class="stat"><div class="sl">Jornadas</div><div class="sv">${jList.length}</div></div>
    <div class="stat"><div class="sl">Eventos</div><div class="sv">${evList.length}</div></div>
  </div>
</div>
${years.length?years.map(year=>`
  <div style="margin-bottom:24px">
    <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:var(--brand);margin-bottom:12px;border-left:3px solid var(--brand);padding-left:12px">${year}</div>
    ${byYear[year].map(e=>`
      <div class="li" style="padding:10px 0;border-bottom:1px solid var(--b1)">
        <div style="width:26px;height:26px;border-radius:50%;background:var(--s2);border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0">${e.icon||'✓'}</div>
        <div style="flex:1">
          <div style="font-size:12px;font-weight:600">${esc(e.title)}</div>
          ${e.description?`<div style="font-size:10px;color:var(--t3)">${esc(e.description)}</div>`:''}
        </div>
        <div style="font-size:10px;color:var(--t4)">${e.event_date?new Date(e.event_date).toLocaleDateString('pt-BR'):''}</div>
      </div>`).join('')}
  </div>`).join(''):`<div class="empty"><div class="ei">📖</div><div class="et">Seu legado está sendo construído</div><div class="es">Conclua etapas e marcos para registrar sua história</div></div>`}`
}

function launchConfetti(count=60){
  const wrap=document.createElement('div');wrap.className='confetti-wrap';document.body.appendChild(wrap)
  const colors=['#7B5EA7','#A78BFA','#34D399','#FCD34D','#F472B6','#60A5FA']
  for(let i=0;i<count;i++){
    const el=document.createElement('div');el.className='confetti-piece'
    const c=colors[Math.floor(Math.random()*colors.length)]
    const l=Math.random()*100,d=Math.random()*1.5,du=1.5+Math.random()*1.5,sz=6+Math.random()*8
    el.style.cssText=`left:${l}%;background:${c};width:${sz}px;height:${sz}px;animation-duration:${du}s;animation-delay:${d}s;border-radius:${Math.random()>.5?'50%':'2px'}`
    wrap.appendChild(el)
  }
  setTimeout(()=>wrap.remove(),4000)
}

function showLevelUp(newLevel,title=''){
  launchConfetti(80)
  const overlay=document.createElement('div');overlay.className='level-up-overlay'
  overlay.innerHTML=`<div class="level-up-card">
    <div style="font-size:52px;margin-bottom:8px">⚡</div>
    <div style="font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--brand2);margin-bottom:6px">NÍVEL ALCANÇADO</div>
    <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:56px;line-height:1;color:var(--t1);margin-bottom:4px">${newLevel}</div>
    ${title?`<div style="font-size:14px;color:var(--brand2);font-weight:700;margin-bottom:16px">${title}</div>`:'<div style="margin-bottom:16px"></div>'}
    <div style="font-size:13px;color:var(--t3);margin-bottom:20px">Continue evoluindo no NeurOS</div>
    <button class="btn bp" onclick="this.closest('.level-up-overlay').remove();autoEquipUnlocked()" style="width:100%">Continuar →</button>
  </div>`
  document.body.appendChild(overlay)

}

async function getUnlockedItems(){
  const level=PROFILE?.evolution_level||1
  const{data:achs}=await SB.from('achievements').select('key').eq('user_id',USER.id)
  const earned=new Set((achs||[]).map(a=>a.key))
  const unlocked=new Set()
  Object.values(AVATAR_ITEMS).flat().forEach(i=>{if(i.free)unlocked.add(i.id)})
  UNLOCK_RULES.forEach(r=>{
    if(r.type==='level'&&level>=r.value)unlocked.add(r.itemId)
    if(r.type==='achievement'&&earned.has(r.key))unlocked.add(r.itemId)
  })
  return unlocked
}

function getItemUnlockLabel(itemId){
  const r=UNLOCK_RULES.find(x=>x.itemId===itemId);return r?r.label:''
}

async function autoEquipUnlocked(){
  const unlocked=await getUnlockedItems()
  const eq=loadEquipped();let changed=false
  const defaults={armor:'armor_none',helmet:'helmet_none',weapon:'weapon_none',cape:'cape_none',accessory:'acc_none'}
  Object.entries(defaults).forEach(([slot,def])=>{
    if(eq[slot]===def){
      const best=[...(AVATAR_ITEMS[slot]||[])].reverse().find(i=>unlocked.has(i.id)&&i.id!==def)
      if(best){eq[slot]=best.id;changed=true}
    }
  })
  if(changed){saveEquipped(eq);toast('Nova peça desbloqueada! ⚔️')}
}

async function checkAndAwardAchievement(key){
  const def=ACHIEVEMENT_DEFS.find(a=>a.key===key)
  if(!def)return
  // Check if already earned
  const{count}=await SB.from('achievements').select('id',{count:'exact',head:true}).eq('user_id',USER.id).eq('key',key)
  if(count>0)return
  // Award
  await SB.from('achievements').insert({user_id:USER.id,key,title:def.title,description:def.desc,icon:def.icon,xp_reward:def.xp})
  // Give XP + Coins
  if(PROFILE?.evolution_xp!==undefined){
    const oldLevel=PROFILE.evolution_level||1
    const newXP=(PROFILE.evolution_xp||0)+def.xp
    const newLevel=Math.floor(newXP/200)+1
    const coinsGain=Math.round(def.xp/2)
    const newCoins=(PROFILE.coins||0)+coinsGain
    await SB.from('profiles').update({evolution_xp:newXP,evolution_level:newLevel,coins:newCoins}).eq('id',USER.id)
    PROFILE.evolution_xp=newXP
    PROFILE.evolution_level=newLevel
    PROFILE.coins=newCoins
    if(newLevel>oldLevel) setTimeout(()=>showLevelUp(newLevel,getTitleByLevel(newLevel)),600)
  }
  // Show toast + confetti
  toast('🏆 Conquista: '+def.title+' +'+def.xp+'XP')
  launchConfetti(40)
}

function selSubIcon(ic){
  window._subIcon=ic
  document.querySelectorAll('[data-sicon]').forEach(el=>el.style.background=el.dataset.sicon===ic?'var(--s3)':'transparent')
}
function selSubColor(c){
  window._subColor=c
  document.querySelectorAll('[data-scolor]').forEach(el=>el.style.border=el.dataset.scolor===c?'2px solid #fff':'2px solid transparent')
}

async function saveSubject(){
  const name=document.getElementById('sname').value.trim()
  if(!name){toast('Informe o nome','err');return}
  await SB.from('subjects').insert({user_id:USER.id,name,icon:window._subIcon||'📚',color:window._subColor||'#7B5EA7'})
  cm();toast('Matéria criada!');await checkAndAwardAchievement('first_subject');pgSubjects()
}

async function viewSubject(id){
  const{data:s}=await SB.from('subjects').select('*').eq('id',id).single()
  if(!s)return
  const pct=Math.min(100,Math.round((s.xp||0)/((s.level||1)*500)*100))
  openModal(`
<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
  <div style="width:46px;height:46px;border-radius:12px;background:${s.color};display:flex;align-items:center;justify-content:center;font-size:22px">${s.icon}</div>
  <div style="flex:1">
    <div class="mt" style="margin:0">${esc(s.name)}</div>
    <div style="font-size:11px;color:var(--t3)">Nível ${s.level||1} · ${s.xp||0} XP · ${Math.round((s.total_minutes||0)/60)}h</div>
  </div>
  ${ring(pct,52,4,s.color||'var(--brand)')}
</div>
<div style="padding:12px;background:var(--s2);border-radius:var(--r);margin-bottom:14px">
  <div style="font-size:11px;color:var(--t3);margin-bottom:8px">Registrar sessão de estudo</div>
  <div style="display:flex;gap:8px">
    <input class="input" id="smin" type="number" placeholder="Minutos estudados" min="1">
    <button class="btn bp bsm" onclick="logSubjectStudy('${s.id}')">✓</button>
  </div>
</div>
<div class="ma">
  <button class="btn bd bsm" onclick="delSubject('${s.id}')">🗑</button>
  <button class="btn bg" onclick="cm()">Fechar</button>
</div>`)
}

async function logSubjectStudy(id){
  const mins=+document.getElementById('smin').value
  if(!mins||mins<=0){toast('Informe os minutos','err');return}
  const xpGain=Math.round(mins*0.5)
  const{data:s}=await SB.from('subjects').select('xp,level,total_minutes').eq('id',id).single()
  if(!s)return
  const newXP=(s.xp||0)+xpGain
  const newLevel=Math.floor(newXP/500)+1
  await SB.from('subjects').update({
    xp:newXP, level:newLevel,
    total_minutes:(s.total_minutes||0)+mins,
    last_studied:today(), updated_at:new Date().toISOString()
  }).eq('id',id)
  cm();toast(`+${xpGain}XP de estudo!`);pgSubjects()
}

async function delSubject(id){
  if(!confirm('Apagar matéria?'))return
  await SB.from('subjects').delete().eq('id',id)
  cm();toast('Matéria apagada');pgSubjects()
}

// ════════════════════════════════════════════
// STREAK VISUAL — atualizar streak global
// ════════════════════════════════════════════
async function updateGlobalStreak(){
  if(!USER||!PROFILE)return
  const lastActive=PROFILE.last_active_date
  const todayStr=today()
  if(lastActive===todayStr)return // já contou hoje
  const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1)
  const yStr=yesterday.toISOString().split('T')[0]
  const newStreak=lastActive===yStr?(PROFILE.global_streak||0)+1:1
  await SB.from('profiles').update({global_streak:newStreak,last_active_date:todayStr}).eq('id',USER.id)
  PROFILE.global_streak=newStreak
  PROFILE.last_active_date=todayStr
  // Check streak achievements
  if(newStreak>=7)await checkAndAwardAchievement('streak_7')
  if(newStreak>=30)await checkAndAwardAchievement('streak_30')
}

// NOTIFICAÇÕES

async function loadNotifications(){
  try{
    const{data}=await SB.from('notifications').select('*').eq('user_id',USER.id).eq('is_dismissed',false).order('created_at',{ascending:false}).limit(12)
    const notifs=data||[],unread=notifs.filter(n=>!n.is_read)
    const dot=document.getElementById('ndot');if(dot)dot.classList.toggle('on',unread.length>0)
    const list=document.getElementById('notif-list')
    if(list)list.innerHTML=notifs.length?notifs.map(n=>`<div class="notif-item${!n.is_read?' unread':''}" onclick="readNotif('${n.id}')"><div class="ni-title">${esc(n.title)}</div>${n.description?`<div class="ni-desc">${esc(n.description)}</div>`:''}<div class="ni-time">${fmt(n.created_at)}</div></div>`).join(''):`<div style="padding:18px;text-align:center;font-size:11px;color:var(--t3)">Nenhuma notificação</div>`
  }catch(e){}
}
function toggleNotif(){document.getElementById('notif-panel').classList.toggle('on');loadNotifications()}
async function readNotif(id){await SB.from('notifications').update({is_read:true}).eq('id',id);loadNotifications()}
async function markAllRead(){await SB.from('notifications').update({is_read:true}).eq('user_id',USER.id).eq('is_read',false);loadNotifications();toast('Lidas!')}
async function generateDecisionAlerts(){
  try{
    const[meds,fc,habits,hl]=await Promise.all([
      SB.from('medications').select('*').eq('user_id',USER.id).eq('is_active',true),
      SB.from('flashcards').select('id,fsrs_due').eq('user_id',USER.id),
      SB.from('habits').select('id,name').eq('user_id',USER.id).eq('is_active',true),
      SB.from('habit_logs').select('habit_id').eq('user_id',USER.id).eq('log_date',today()),
    ])
    const medData=meds.data||[],cards=fc.data||[],hData=habits.data||[],hLogs=new Set((hl.data||[]).map(x=>x.habit_id))
    const dueCount=cards.filter(f=>new Date(f.fsrs_due)<=new Date()).length
    if(dueCount>5)await SB.from('notifications').insert({user_id:USER.id,title:`${dueCount} flashcards para revisar`,description:'Mantenha sua retenção em dia.',category:'ESTUDO',priority:'MEDIUM'}).select()
    for(const m of medData){const rem=m.total_units-m.used_units;if(rem<=m.alert_at)await SB.from('notifications').insert({user_id:USER.id,title:`Estoque baixo: ${m.name}`,description:`${rem} unidades restantes`,category:'MEDICAMENTO',priority:rem<=5?'HIGH':'MEDIUM'}).select()}
    loadNotifications()
  }catch(e){}
}


init()
